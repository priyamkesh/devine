<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PriAxom Devine Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="liquid-glass">
        <div class="header-left">
            <h1 class="title">PriAxom Devine Engine<span class="copyright">©</span></h1>
            <p class="author">By Priyam Kesh</p>
        </div>
        <div class="header-right">
            <a href="https://priyamkesh.github.io/devine/" class="home-btn">HOME</a>
        </div>
    </header>

    <main class="chat-area" id="chat-history"></main>

    <footer class="input-bar liquid-glass">
        <input type="text" id="user-input" placeholder="Seek guidance here..." autocomplete="off">
        <button id="send-btn" aria-label="Send Message">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="19" x2="12" y2="5"></line>
                <polyline points="5 12 12 5 19 12"></polyline>
            </svg>
        </button>
    </footer>

    <!-- Liquid Glass Refraction Filter -->
    <svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
        <defs>
            <filter id="liquid-distort" x="-10%" y="-10%" width="120%" height="120%">
                <feTurbulence type="fractalNoise" baseFrequency="0.022 0.018" numOctaves="3" seed="7" result="noise"/>
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="16" xChannelSelector="R" yChannelSelector="B"/>
            </filter>
        </defs>
    </svg>

    <script src="script.js"></script>
</body>
</html>
